<!-- ══════════════════════════════════════════════════════════════════════════
     MAIN APPLICATION SCRIPT
     Uses ES module syntax so we can import @spotify/basic-pitch via esm.sh.
     ══════════════════════════════════════════════════════════════════════════ -->
<script type="module">

// ── IMPORTS ──────────────────────────────────────────────────────────────────
// BasicPitch   — Spotify's TensorFlow.js model for polyphonic note detection
// noteFramesToTime   — converts raw frame output → {startTime, duration, …} objects
// addPitchBendsToNoteEvents — attaches per-note bend data from contour arrays
// outputToNotesPoly  — decodes frame + onset matrices → polyphonic note list
import {
    BasicPitch,
    noteFramesToTime,
    addPitchBendsToNoteEvents,
    outputToNotesPoly
} from 'https://esm.sh/@spotify/basic-pitch@1.0.1';


// ── NOTE HELPERS ─────────────────────────────────────────────────────────────

/** Western note names in chromatic order, used for MIDI ↔ name conversion. */
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

/**
 * Convert a MIDI note number to a human-readable note name.
 * MIDI 60 = C4, 69 = A4, etc.
 * @param {number} m - MIDI note number (0–127)
 * @returns {string} e.g. "A4", "C#3"
 */
function midiToName(m) {
    return NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);
}

/**
 * Convert a note name string back to its MIDI number.
 * Used when comparing sung vs. expected pitch.
 * @param {string} n - Note name, e.g. "G#4"
 * @returns {number} MIDI note number
 */
function nameToMidi(n) {
    const base = n.replace(/\d/, '');
    const oct  = parseInt(n.match(/\d/)?.[0] ?? 4);
    return (oct + 1) * 12 + NOTE_NAMES.indexOf(base);
}


// ── CANVAS / LANE CONSTANTS ───────────────────────────────────────────────────

/**
 * Vocal range covered by the timeline: C3 (MIDI 48) through C5 (MIDI 72).
 * 25 semitones gives one lane per semitone across the typical singing range.
 */
const N_LANES       = 25;
const LANE_BASE_MIDI = 48; // C3

/**
 * Pre-computed HSL colours for each lane, cycling through the visible spectrum
 * (hue 0–300°) so low notes appear warm and high notes appear cool/violet.
 */
const LANE_COLORS = [];
for (let i = 0; i < N_LANES; i++) {
    const hue = (i / N_LANES) * 300;
    LANE_COLORS.push(`hsl(${hue}, 90%, 55%)`);
}


// ── APPLICATION STATE ─────────────────────────────────────────────────────────

let audioFile    = null;   // File object from drop/picker or YouTube blob
let audioCtx     = null;   // Shared AudioContext (created lazily on first user gesture)

// Web Audio nodes
let analyser     = null;   // AnalyserNode for reading mic time-domain data
let scriptProc   = null;   // ScriptProcessorNode triggers processMic() each block
let micStream    = null;   // MediaStream returned by getUserMedia
let gainNode     = null;   // GainNode for mic boost (exposed as window._gainNode)
let sourceNode   = null;   // AudioBufferSourceNode for song playback

/** @type {Array<{timeMs:number, durMs:number, note:string, lane:number,
 *                midi:number, lyric:string, state:string, triggered:boolean}>} */
let pills        = [];     // Detected note events (one pill = one note)

let isPlaying    = false;  // True while song is playing
let isLooping    = false;  // True when loop toggle is active
let startTime    = null;   // performance.now() value at playback start
let songDuration = 0;      // Total song duration in milliseconds
let rafId        = null;   // requestAnimationFrame handle (for cancellation)
let currentExpected = null; // Note name the singer should currently hit
let wrongFrames  = 0;      // Consecutive mic frames outside the ±1 semitone window

/**
 * Number of consecutive wrong frames required before switching the
 * display to "too-high" or "too-low". Prevents flickering on transient errors.
 */
const WRONG_THRESH = 3;

/** @type {Array<{timestamp:[number,number], text:string}>} Word-level lyric data from AssemblyAI */
let lyricChunks = [];

// Canvas references (assigned in initCanvas)
let canvas, ctx;


// ── INIT ──────────────────────────────────────────────────────────────────────

/**
 * On page load:
 *  - Restore persisted API keys from localStorage
 *  - Set up the canvas and render the empty timeline
 */
// ── CAPTCHA ───────────────────────────────────────────────────
let captchaAnswer   = 0;
let captchaCallback = null;

function showCaptcha(callback) {
    const x = Math.floor(Math.random() * 9) + 1;
    const y = Math.floor(Math.random() * 9) + 1;
    captchaAnswer   = x + y;
    captchaCallback = callback;
    document.getElementById('captcha-question').textContent = `${x} + ${y} = ?`;
    document.getElementById('captcha-answer').value = '';
    document.getElementById('captcha-error').textContent = '';
    document.getElementById('captcha-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('captcha-answer').focus(), 100);

/**

        setStatus('Running Basic Pitch + AssemblyAI in parallel... ☕', 15);
        const [noteResult, lyricResult] = await Promise.allSettled([
            runBasicPitch(buf),
            runAssemblyAI()
        ]);

        if (noteResult.status === 'fulfilled') {
            pills = noteResult.value;

/**
 * Run the Spotify Basic Pitch model on a decoded AudioBuffer.
 *
 * Steps:
 *  1. Resample to 22 050 Hz (model's required sample rate)
 *  2. Run the TF.js model chunk-by-chunk (progress callbacks update the status bar)
 *  3. Convert raw frame/onset/contour matrices → note event objects
 *  4. Merge very-close same-lane notes to reduce fragmentation
 *
 * @param {AudioBuffer} buf - Decoded audio at any sample rate
 * @returns {Promise<Array>} Array of pill objects ready for rendering
 */
async function runBasicPitch(buf) {
    setStatus('⬇ Downloading Spotify model (~50 MB first time)...', 18);
    const resampled = await resample(buf, 22050); // model requires exactly 22 050 Hz

    setStatus('🧠 Basic Pitch detecting notes...', 24);

    // Accumulate frame / onset / contour tensors from each model chunk
    const frames = [], onsets = [], contours = [];
    const bp = new BasicPitch('https://unpkg.com/@spotify/basic-pitch@1.0.1/model/model.json');

    await bp.evaluateModel(
        resampled,
        (f, o, c) => { frames.push(...f); onsets.push(...o); contours.push(...c); },
        p => setStatus(
            `🧠 Basic Pitch: ${Math.round(p * 100)}%  🎤 AssemblyAI transcribing...`,
            24 + p * 55
        )
    );

    // Decode model output into a list of note events with timing + MIDI pitch
    // Thresholds: onset 0.25, frame 0.25, min 5 frames (~50 ms) — filters noise
    const raw = noteFramesToTime(
        addPitchBendsToNoteEvents(
            contours,
            outputToNotesPoly(frames, onsets, 0.25, 0.25, 5)
        )
    );

    // ── Build pill array ───────────────────────────────────────────────────────
    const merged = [];
    raw
        .filter(n => n.durationSeconds > 0.08 && n.amplitude > 0.25) // drop very short / quiet notes
        .forEach(n => {
            const lane   = Math.max(0, Math.min(N_LANES - 1, n.pitchMidi - LANE_BASE_MIDI));
            const timeMs = n.startTimeSeconds * 1000;
            const durMs  = Math.max(n.durationSeconds * 1000, 120); // minimum visible pill width
            const note   = midiToName(n.pitchMidi);
            const last   = merged[merged.length - 1];

            // Merge into the previous pill if same lane AND gap < 60 ms
            // (avoids visual stutter from tiny silences within a held note)
            if (last && last.lane === lane && timeMs - (last.timeMs + last.durMs) < 60) {
                last.durMs = (timeMs + durMs) - last.timeMs;
            } else {
                merged.push({
                    timeMs,
                    durMs,
                    note,
                    lane,
                    midi: n.pitchMidi,
                    lyric: note,    // will be overwritten by assignLyrics() if lyrics available
                    state: 'upcoming',
                    triggered: false
                });
            }
        });
    return merged;
}

/**
 * Upload the audio file to AssemblyAI and poll until word-level
 * transcription is complete.
 *
 * Returns an array of { timestamp: [startSec, endSec], text: word } objects
 * that match AssemblyAI's word-level response shape, normalised to seconds.
 *
 * Throws if: no token found, upload fails, transcription errors, or timeout.
 * @returns {Promise<Array<{timestamp:[number,number], text:string}>>}
 */
async function runAssemblyAI() {
    const token = localStorage.getItem('aai_token');
    if (!token) throw new Error('No AssemblyAI token');

    // Step 1 — Upload raw audio bytes; AssemblyAI returns a hosted URL
    const uploadRes = await fetch('https://api.assemblyai.com/v2/upload', {
        method: 'POST',
        headers: {
            'authorization'  : token,
            'content-type'   : 'application/octet-stream'
        },
        body: audioFile
    });
    if (!uploadRes.ok)
        throw new Error('AAI upload failed: ' + uploadRes.status + ' ' + await uploadRes.text());

    const { upload_url } = await uploadRes.json();
    console.log('AAI uploaded to:', upload_url);

    // Step 2 — Request transcription with word-level timestamps
    const transcriptRes = await fetch('https://api.assemblyai.com/v2/transcript', {
        method: 'POST',
        headers: {
            'authorization': token,
            'content-type' : 'application/json'
        },
        body: JSON.stringify({
            audio_url    : upload_url,
            speech_models: ['universal-2'] // highest accuracy model
        })
    });
    const transcriptBody = await transcriptRes.text();
    console.log('AAI transcript request status:', transcriptRes.status, transcriptBody);
    if (!transcriptRes.ok)
        throw new Error('AAI transcript request failed: ' + transcriptRes.status + ' ' + transcriptBody);

    const { id } = JSON.parse(transcriptBody);
    console.log('AAI transcript job ID:', id);

    // Step 3 — Poll every 3 s for up to 3 minutes (60 × 3 s)
    for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 3000));

        const pollRes = await fetch(`https://api.assemblyai.com/v2/transcript/${id}`, {
            headers: { 'authorization': token }
        });
        const data = await pollRes.json();
        console.log('AAI poll status:', data.status);

        if (data.status === 'completed') {
            const words = data.words || [];
            console.log('AAI sample words:', words.slice(0, 5));

            // Normalise: convert start/end from ms to seconds
            return words.map(w => ({
                timestamp: [w.start / 1000, w.end / 1000],
                text: w.text
            }));
        }
        if (data.status === 'error') throw new Error('AAI error: ' + data.error);
    }
    throw new Error('AAI timed out after 3 minutes');
}

/**
 * Resample an AudioBuffer to a target sample rate using the OfflineAudioContext.
 * Basic Pitch requires exactly 22 050 Hz input.
 * @param {AudioBuffer} buf
 * @param {number} rate - Target sample rate in Hz
 * @returns {Promise<AudioBuffer>}
 */
async function resample(buf, rate) {
    const ctx2 = new OfflineAudioContext(1, Math.ceil(buf.duration * rate), rate);
    const src  = ctx2.createBufferSource();
    src.buffer = buf;
    src.connect(ctx2.destination);
    src.start(0);
    return ctx2.startRendering();
}


// ── LYRIC ASSIGNMENT ──────────────────────────────────────────────────────────

/**
 * Explode lyricChunks (which may span multiple words) into a flat word-map
 * where each entry has a precise start/end in milliseconds.
 *
 * When a chunk contains multiple words, the duration is divided evenly
 * between them (AssemblyAI gives chunk-level not sub-word timestamps).
 *
 * @returns {Array<{startMs:number, endMs:number, word:string}>}
 */
function buildWordMap() {
    const wordMap = [];
    lyricChunks.forEach(chunk => {
        const startMs = (chunk.timestamp?.[0] ?? 0) * 1000;
        const endMs   = (chunk.timestamp?.[1] ?? startMs + 500) * 1000;
        const words   = chunk.text?.trim().split(/\s+/).filter(Boolean) || [];
        if (!words.length) return;

        const durPerWord = (endMs - startMs) / words.length;
        words.forEach((word, i) => {
            wordMap.push({
                startMs: startMs + i * durPerWord,
                endMs  : startMs + (i + 1) * durPerWord,
                word
            });
        });
    });
    return wordMap;
}

/** Flat word-level timing map, populated by assignLyrics(). */
let wordMap = [];

/**
 * Match each pill to the nearest lyric word by start timestamp,
 * then store that word as pill.lyric for canvas rendering.
 */
function assignLyrics() {
    if (!lyricChunks.length) return;
    wordMap = buildWordMap();
    console.log('Word map built:', wordMap.length, 'words');
    if (!wordMap.length) return;

    pills.forEach(p => {
        let closest = null, minDiff = Infinity;
        wordMap.forEach(w => {
            const diff = Math.abs(p.timeMs - w.startMs);
            if (diff < minDiff) { minDiff = diff; closest = w; }
        });
        if (closest) p.lyric = closest.word;
    });

    // Note: consecutive pills may share the same lyric (held note across syllable)
    // — this is intentional; de-duplication would incorrectly drop lyrics.
}

/**
 * Return the word currently active at a given playback position.
 * @param {number} elapsed - Milliseconds since playback start
 * @returns {{startMs:number, endMs:number, word:string}|null}
 */
function getCurrentWord(elapsed) {
    if (!wordMap.length) return null;
    return wordMap.find(w => elapsed >= w.startMs && elapsed < w.endMs) || null;
}

/**
 * Request microphone permission and wire up the Web Audio processing graph:
 *
 *   MediaStreamSource → GainNode → AnalyserNode → ScriptProcessorNode → destination
 *
 * The ScriptProcessorNode fires processMic() for every audio block,
 * which runs autocorrelation to detect the sung pitch.
 *
 * Raw processing is done via ScriptProcessor rather than AudioWorklet for
 * maximum browser compatibility (iOS Safari, older Chrome).
 */
window.initMic = async function() {
    if (micStream) return; // already initialised — do nothing

    try {
        ensureCtx();

        // Larger FFT size = better frequency resolution for lower notes
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 4096;

        // Disable browser processing that would corrupt pitch analysis
        micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation  : false,
                noiseSuppression  : false,
                autoGainControl   : false
            }
        });

        const mic   = audioCtx.createMediaStreamSource(micStream);
        scriptProc  = audioCtx.createScriptProcessor(2048, 1, 1);
        gainNode    = audioCtx.createGain();
        gainNode.gain.value = +document.getElementById('mic-boost').value || 3;
        window._gainNode    = gainNode; // exposed so the boost slider can update it

        // Connect the audio graph
        mic.connect(gainNode);
        gainNode.connect(analyser);
        analyser.connect(scriptProc);
        scriptProc.connect(audioCtx.destination);
        scriptProc.onaudioprocess = processMic;

        // Update UI to reflect active mic state
        document.getElementById('mic-v').textContent          = 'ON';
        document.getElementById('mic-stat').classList.add('on');
        document.getElementById('mic-btn').textContent        = '🎤 ON';

// ── PITCH DETECTION ───────────────────────────────────────────────────────────

/**
 * Normalised Sum of Absolute Differences (NSAD) autocorrelation.
 * A time-domain approach that is accurate enough for single-voice singing
 * and computationally cheap compared to FFT-based methods.
 *
 * Returns the fundamental frequency in Hz, or -1 if the signal is too quiet
 * or no clear periodic component is found.
 *
 * @param {Float32Array} buf - PCM samples (mono, full AnalyserNode frame)
 * @param {number} sr        - Sample rate in Hz
 * @returns {number} Frequency in Hz, or -1
 */
function autoCorrelate(buf, sr) {
    const SIZE = buf.length;
    const MAX  = Math.floor(SIZE / 2);

    // RMS energy gate — ignore frames that are silent / below noise floor
    let rms = 0;
    for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.008) return -1;

    // Find the lag offset (period) with the highest autocorrelation
    let bestOffset = -1, bestCorr = 0, lastCorr = 1;
    for (let o = 1; o < MAX; o++) {
        let c = 0;
        for (let i = 0; i < MAX; i++) c += Math.abs(buf[i] - buf[i + o]);
        c = 1 - c / MAX; // normalise to 0–1

        // Accept only a clear peak above 0.8 — prevents octave errors
        if (c > 0.8 && c > lastCorr && c > bestCorr) {
            bestCorr   = c;
            bestOffset = o;
        }
        lastCorr = c;
    }

    return bestCorr > 0.01 ? sr / bestOffset : -1;
}

/**
 * Convert a frequency (Hz) to a MIDI-based note name.
 * Only handles the vocal range 60 Hz (B1) – 1200 Hz (~D6).
 * @param {number} f - Frequency in Hz
 * @returns {{name:string, midi:number}|null}
 */
function freqToNote(f) {
    if (f < 60 || f > 1200) return null;
    const midi = Math.round(12 * Math.log2(f / 440) + 69);
    return { name: midiToName(midi), midi };
}

/** Number of recent mic frames kept for majority-vote smoothing. */
const NOTE_HISTORY = 8;

/** Ring buffer of recent detected note names (or null for silence). */
let noteHistory = [];

/**
 * Majority-vote smoother over the last NOTE_HISTORY mic frames.
 * Returns a note name only when it appears in ≥ half the frames,
 * which eliminates transient misdetections between notes.
 * @returns {string|null} Smoothed note name, e.g. "A4", or null
 */
function smoothedNote() {
    if (!noteHistory.length) return null;
    const counts = {};
    noteHistory.forEach(n => { if (n) counts[n] = (counts[n] || 0) + 1; });
    const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return best && best[1] >= NOTE_HISTORY / 2 ? best[0] : null;
}

/**
 * ScriptProcessorNode callback — runs for every 2048-sample audio block.
 *
 * Pipeline per block:
 *  1. Compute RMS to gate silence
 *  2. Autocorrelate to find fundamental frequency
 *  3. Convert Hz → note name
 *  4. Push to smoothing history
 *  5. Compare smoothed note to currentExpected → update UI colours
 *  6. Mark matched pill as 'hit' on the canvas
 */
function processMic() {
    if (!analyser) return;

    const buf = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buf);

    // Compute RMS for the voice-activity check
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / buf.length);

    const wordEl = document.getElementById('big-word');
    const noteEl = document.getElementById('note-name');

    if (rms > 0.01) { // voice detected
        const freq     = autoCorrelate(buf, audioCtx.sampleRate);
        const det      = freqToNote(freq);

        // Push into the smoothing ring buffer
        noteHistory.push(det?.name ?? null);
        if (noteHistory.length > NOTE_HISTORY) noteHistory.shift();
        const smoothed = smoothedNote();

        // Update "YOU" stat and sung-note display
        document.getElementById('you-v').textContent    = smoothed ?? (det?.name ?? '~');
        document.getElementById('sung-note').textContent = smoothed ?? (det?.name ?? '~');

        if (smoothed && currentExpected) {
            const detMidi = nameToMidi(smoothed);
            const expMidi = nameToMidi(currentExpected);
            const diff    = detMidi - expMidi; // positive = sung too high

            if (Math.abs(diff) <= 1) {
                // Within ±1 semitone — green
                wordEl.className = noteEl.className = 'correct';
                wrongFrames = 0;

                // Mark the currently active pill as 'hit' so it turns white
                pills.forEach(p => {
                    if (p.triggered && p.state === 'upcoming' && p.note === currentExpected) {
                        p.state = 'hit';
                    }
                });

            } else if (diff > 1) {
                // Sung pitch is above the target — yellow
                // Only change colour after WRONG_THRESH consecutive wrong frames
                // to avoid distracting flickers during pitch transitions.
                wordEl.className = noteEl.className = 'too-high';
                wrongFrames++;

            } else {
                // Sung pitch is below the target — red
                wordEl.className = noteEl.className = 'too-low';
                wrongFrames++;
            }
        } else {
            // Note detected but no expected reference (between pills) — clear colour
            wordEl.className = noteEl.className = '';
        }

    } else {
        // Below RMS threshold — silence / breath
        noteHistory.push(null);
        if (noteHistory.length > NOTE_HISTORY) noteHistory.shift();
        document.getElementById('you-v').textContent     = '—';
        document.getElementById('sung-note').textContent = '—';
        wordEl.className = noteEl.className = '';
        wrongFrames = 0;
    }
}

/**
 * Start song playback from the beginning.
 * Decodes the audio file fresh each time so the AudioBuffer is not reused
 * across multiple plays (some browsers do not allow re-use after the source
 * has been stopped).
 */
window.play = function() {
    if (!pills.length) { alert('Detect notes first!'); return; }
    ensureCtx();

    // Reset all pill states so the canvas starts clean
    pills.forEach(p => { p.state = 'upcoming'; p.triggered = false; });

    const reader = new FileReader();
    reader.onload = e => {
        audioCtx.decodeAudioData(e.target.result, buf => {
            songDuration = buf.duration * 1000;

            // Stop any currently playing source before creating a new one
            if (sourceNode) { try { sourceNode.stop(); } catch (_) {} }

            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = buf;
            sourceNode.connect(audioCtx.destination);
            sourceNode.start(0);

            isPlaying = true;
            startTime = performance.now();

            document.getElementById('play-btn').disabled  = true;
            document.getElementById('stop-btn').disabled  = false;
            document.getElementById('big-word').textContent = '🎤';
            document.getElementById('big-word').className   = '';

            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(loop);
        });
    };
    reader.readAsArrayBuffer(audioFile);
};

/**
 * Stop playback and reset all UI state back to "ready to play".
 * Called by the Stop button, the loop end handler, and implicitly by play().
 */
window.stop = function() {
    isPlaying = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (sourceNode) { try { sourceNode.stop(); } catch (_) {} sourceNode = null; }

    // Reset runtime state
    currentExpected = null;
    wrongFrames     = 0;
    lastWord        = null;
    noteHistory     = [];

    // Reset UI
    document.getElementById('play-btn').disabled           = false;
    document.getElementById('stop-btn').disabled           = true;
    document.getElementById('exp-v').textContent           = '—';
    document.getElementById('big-word').textContent        = '⏹';
    document.getElementById('big-word').className          = '';
    document.getElementById('sung-note').textContent       = '—';
    document.getElementById('exp-note').textContent        = '—';
    document.getElementById('note-name').className         = '';
    document.getElementById('song-progress-fill').style.width = '0%';

    pills.forEach(p => { p.state = 'upcoming'; p.triggered = false; });
    renderCanvas(0);
};

/**
 * Toggle loop mode on/off.
 * When looping, stop() is called at song end and play() is re-triggered
 * after a 300 ms gap (prevents AudioContext issues with immediate restarts).
 * @param {HTMLButtonElement} btn - The loop button element
 */
window.toggleLoop = function(btn) {
    isLooping          = !isLooping;
    btn.textContent    = isLooping ? '🔁 ON'   : '🔁 LOOP';
    btn.style.background = isLooping ? '#FF9800' : '#333';
};


// ── RAF MAIN LOOP ─────────────────────────────────────────────────────────────

/** Track the last displayed lyric word to avoid redundant DOM updates. */
let lastWord = null;

/**
 * requestAnimationFrame tick — the heart of the playback engine.
 *
 * Each frame:
 *  1. Compute elapsed time since play() was called
 *  2. Update the song progress bar
 *  3. Find the active lyric word and update the big display (only on change)
 *  4. Find the nearest note pill → set currentExpected (always live, not just on trigger)
 *  5. Trigger pills that have passed their start time → start the hit/miss timer
 *  6. Check for end-of-song → stop or loop
 *  7. Re-render the scrolling canvas
 */
function loop() {
    if (!isPlaying) return;
    const elapsed = performance.now() - startTime;

    // ── Song progress bar ──────────────────────────────────────────────────────
    if (songDuration) {
        document.getElementById('song-progress-fill').style.width =
            Math.min(100, (elapsed / songDuration) * 100) + '%';
    }

    // ── Lyric display (word-level from AssemblyAI) ─────────────────────────────
    if (lyricChunks.length) {
        const activeWord = lyricChunks.find(c => {
            const s = (c.timestamp?.[0] ?? 0) * 1000;
            const e = (c.timestamp?.[1] ?? 0) * 1000;
            return elapsed >= s && elapsed < e;
        });
        const word = activeWord?.text?.trim() || '';
        if (word !== lastWord) {
            lastWord = word;
            document.getElementById('big-word').textContent = word || '♪';
            document.getElementById('big-word').className   = '';
        }
    }

    // ── Expected note (always tracks nearest pill, not just triggered ones) ─────
    // This ensures currentExpected is set even before a pill reaches the hit line,
    // giving the mic feedback engine an early reference to compare against.
    const nearestPill = pills.reduce((best, p) => {
        const dist = Math.abs(p.timeMs - elapsed);
        return dist < Math.abs((best?.timeMs ?? Infinity) - elapsed) ? p : best;
    }, null);

    if (nearestPill && Math.abs(nearestPill.timeMs - elapsed) < 2000) {
        currentExpected = nearestPill.note;
        document.getElementById('exp-v').textContent   = nearestPill.note;
        document.getElementById('exp-note').textContent = nearestPill.note;
    } else {
        currentExpected = null;
        document.getElementById('exp-note').textContent = '—';
    }

    // ── Pill trigger → hit/miss state ──────────────────────────────────────────
    // Pills are "triggered" when playback time passes their start.
    // A timer runs for durMs ms; if the pill is still 'upcoming' at the end,
    // it flips to 'missed' (turns dark grey on canvas).
    pills.forEach(p => {
        if (!p.triggered && elapsed >= p.timeMs) {
            p.triggered = true;
            setTimeout(() => {
                if (p.state === 'upcoming') p.state = 'missed';
            }, p.durMs);
        }
    });

    // ── End-of-song check ──────────────────────────────────────────────────────
    // Use actual song duration rather than last pill time so the full audio
    // plays even if the last few seconds have no detected notes.
    const endMs = songDuration > 0
        ? songDuration + 1000
        : (pills[pills.length - 1]?.timeMs + pills[pills.length - 1]?.durMs + 1500 || 99999);

    if (elapsed > endMs) {
        if (isLooping) { window.stop(); setTimeout(window.play, 300); }
        else window.stop();
        return;
    }

    renderCanvas(elapsed);
    rafId = requestAnimationFrame(loop);
}


// ── CANVAS RENDERING ──────────────────────────────────────────────────────────

/**
 * Initialise the canvas element and hook into window resize.
 * Called once on page load.
 */
function initCanvas() {
    canvas = document.getElementById('vocal-canvas');
    ctx    = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', () => {
        resizeCanvas();
        if (!isPlaying) renderCanvas(0); // redraw static grid after resize
    });
}

/**
 * Sync the canvas pixel dimensions to its CSS layout size.
 * Must be called after any layout change to avoid blurry rendering.
 */
function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  || 600;
    canvas.height = canvas.offsetHeight || 200;
}

/**
 * Draw a rounded-rectangle pill shape.
 * Canvas2D has no native roundRect in older browsers, so this manually
 * builds the path with arcTo calls.
 *
 * @param {number} x - Left edge
 * @param {number} y - Top edge
 * @param {number} w - Width
 * @param {number} h - Height
 * @param {number} r - Corner radius
 */
function drawPill(x, y, w, h, r) {
    r = Math.min(r, h / 2, w / 2); // clamp so pill never inverts
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

/**
 * Render one frame of the scrolling note-timeline canvas.
 *
 * Layout:
 *  - N_LANES horizontal lanes; lane 0 = C3 at bottom, lane 24 = C5 at top
 *  - Hit line at 20% from left (hitX) — pills scroll left past this line
 *  - Time window = 5 seconds ahead of the hit line
 *  - Pill colour: HSL spectrum (upcoming) → white (hit) → dark grey (missed)
 *  - Upcoming pills within 500 ms glow with a coloured shadow for emphasis
 *
 * @param {number} [elapsed=0] - Milliseconds since playback start
 */
function renderCanvas(elapsed) {
    elapsed = elapsed ?? 0;
    if (!canvas) return;

    const W   = canvas.width;
    const H   = canvas.height;
    const lH  = H / N_LANES;               // pixels per lane
    const hitX = W * 0.2;                  // x-position of the hit line
    const ppm  = (W - hitX) / 5000;        // pixels per millisecond (5 s window)

    ctx.clearRect(0, 0, W, H);

    // ── Alternating lane backgrounds (very subtle) ─────────────────────────────
    for (let i = 0; i < N_LANES; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#0b0b0b' : '#0e0e0e';
        ctx.fillRect(0, i * lH, W, lH);
    }

    // ── Lane note labels (every 3 semitones keeps it readable) ─────────────────
    for (let i = 0; i < N_LANES; i += 3) {
        ctx.fillStyle    = '#222';
        ctx.font         = '9px Courier New';
        ctx.textAlign    = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(midiToName(LANE_BASE_MIDI + i), 3, i * lH + lH / 2);
    }

    // ── Pills ──────────────────────────────────────────────────────────────────
    pills.forEach(p => {
        const timeUntil = p.timeMs - elapsed;
        const x  = hitX + timeUntil * ppm;               // scroll position
        const pw = Math.max(p.durMs * ppm - 2, 16);      // minimum 16 px wide
        const py = p.lane * lH + lH * 0.1;
        const ph = lH * 0.8;

        // Skip pills entirely off-screen to save draw calls
        if (x > W + pw || x + pw < -10) return;

        let color = LANE_COLORS[p.lane];
        if (p.state === 'hit')    color = '#fff';    // correctly sung → white flash
        if (p.state === 'missed') color = '#1a1a1a'; // missed → dark grey

        // Glow on approach (< 500 ms away)
        if (p.state === 'upcoming' && timeUntil >= 0 && timeUntil < 500) {
            ctx.shadowColor = color;
            ctx.shadowBlur  = 12;
        }

        ctx.fillStyle = color;
        drawPill(x, py, pw, ph, ph / 2);
        ctx.fill();
        ctx.shadowBlur = 0; // always reset shadow after each pill
    });

    // ── Hit line (dashed vertical) ─────────────────────────────────────────────
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(hitX, 0);
    ctx.lineTo(hitX, H);
    ctx.stroke();
    ctx.setLineDash([]); // always reset dash state
}


// ── STATUS BAR HELPERS ────────────────────────────────────────────────────────

/**
 * Show the status bar with a message and progress percentage.
 * @param {string} txt - Status message
 * @param {number} pct - Progress 0–100
 */
function setStatus(txt, pct) {
    document.getElementById('status-bar').classList.add('visible');
    document.getElementById('status-text').textContent  = txt;
    document.getElementById('progress-fill').style.width = pct + '%';
}

/** Hide the status bar once analysis is complete. */
function hideStatus() {
    document.getElementById('status-bar').classList.remove('visible');
}

</script>
