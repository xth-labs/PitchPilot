<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎤 PitchPilot Demo + Coaching</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow: hidden;
        }

        @media (orientation: landscape) {
            #mini-canvas-wrap {
                flex: 0 0 12%;
            }
            #lyrics-section {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #controls-section {
                flex: 0 0 18%;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
                padding: 6px;
            }
            #controls-section button {
                padding: 8px 4px !important;
                font-size: 12px !important;
                min-height: 45px;
            }
        }

        #mini-canvas-wrap {
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            background: #080808;
        }

        #mini-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #lyrics-section {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #big-word {
            font-size: clamp(32px, 15vw, 72px);
            font-weight: bold;
            transition: all 0.1s ease;
            letter-spacing: 2px;
        }

        #big-word.correct {
            color: #4CAF50;
            transform: scale(1.1);
        }

        #big-word.too-high {
            color: #c8e600;
            transform: translateY(-4px);
        }

        #big-word.too-low {
            color: #f44336;
            transform: translateY(4px);
        }

        #note-display {
            font-size: clamp(16px, 8vw, 32px);
            font-weight: bold;
            letter-spacing: 4px;
            color: #666;
            transition: color 0.08s ease;
        }

        #note-display.correct {
            color: #4CAF50;
        }

        #note-display.too-high {
            color: #c8e600;
        }

        #note-display.too-low {
            color: #f44336;
        }

        #status-msg {
            font-size: 12px;
            color: #999;
            text-align: center;
            min-height: 20px;
        }

        #controls-section {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        button {
            background: #E91E63;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        #progress-fill {
            height: 4px;
            background: linear-gradient(90deg, #E91E63, #FF1744);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        /* ── SCORECARD MODAL ────────────────────────────────────────────────── */
        #scorecard-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        #scorecard-modal.show {
            display: flex;
        }

        .scorecard-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: 2px solid #E91E63;
            border-radius: 12px;
            padding: 24px;
            max-width: 90vw;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .scorecard-title {
            font-size: 28px;
            font-weight: bold;
            color: #E91E63;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .scorecard-score {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            text-align: center;
            margin: 20px 0;
        }

        .scorecard-section {
            margin: 20px 0;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid #E91E63;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #E91E63;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-content {
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .word-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .word-tag.correct {
            background: #4CAF50;
            color: #000;
        }

        .word-tag.high {
            background: #c8e600;
            color: #000;
        }

        .word-tag.low {
            background: #f44336;
            color: #fff;
        }

        .word-tag.missed {
            background: #ff6b6b;
            color: #fff;
        }

        .coaching-box {
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }

        .coaching-title {
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .coaching-tips {
            list-style: none;
            padding: 0;
        }

        .coaching-tips li {
            color: #ccc;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
            font-size: 13px;
        }

        .coaching-tips li:before {
            content: "💡";
            position: absolute;
            left: 0;
        }

        .scorecard-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .scorecard-buttons button {
            padding: 14px !important;
            font-size: 16px !important;
            margin: 0 !important;
        }

        .scorecard-buttons button.secondary {
            background: #666 !important;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="mini-canvas-wrap">
        <canvas id="mini-canvas"></canvas>
    </div>

    <div id="lyrics-section">
        <div id="big-word">🎵</div>
        <div id="note-display">—</div>
        <div id="status-msg">Ready</div>
    </div>

    <div id="controls-section">
        <button id="play-btn" onclick="window.play()" style="background: #4CAF50;">▶ Play</button>
        <button id="mic-btn" onclick="toggleMic()">🎤 Tap for Mic</button>
    </div>
    <div id="progress-fill"></div>
</div>

<!-- SCORECARD MODAL -->
<div id="scorecard-modal">
    <div class="scorecard-content">
        <div class="scorecard-title">🎵 Performance Scorecard</div>
        
        <div class="scorecard-score" id="scorecard-accuracy">0%</div>
        <div style="text-align: center; color: #999; font-size: 14px; margin-bottom: 20px;" id="scorecard-summary">
            0 / 0 words correct
        </div>

        <!-- Perfect Words -->
        <div class="scorecard-section" id="perfect-section" style="display: none;">
            <div class="section-title">✅ Nailed It!</div>
            <div class="word-list" id="perfect-words"></div>
        </div>

        <!-- Issues -->
        <div class="scorecard-section" id="issues-section" style="display: none;">
            <div class="section-title">⚠️ Areas to Work On</div>
            <div id="issues-content"></div>
        </div>

        <!-- Coaching Tips -->
        <div class="coaching-box" id="coaching-box" style="display: none;">
            <div class="coaching-title">💡 Personalized Coaching Tips</div>
            <ul class="coaching-tips" id="coaching-tips"></ul>
        </div>

        <!-- Buttons -->
        <div class="scorecard-buttons">
            <button id="try-again-btn" onclick="closeScorecard(); window.play();">🎤 Try Again</button>
            <button id="close-scorecard-btn" class="secondary" onclick="closeScorecard()">← Back</button>
        </div>
    </div>
</div>

<script>
    // ─────────────────────────────────────────────────────────────────────────────
    // PRELOADED DATA
    // ─────────────────────────────────────────────────────────────────────────────
    const DEMO_SONG_URL = 'https://xthereon.com/PitchPilot/imagine.mp3';
    const DEMO_PILLS = [
        { word: "Imagine", note: "A4", timeMs: 1200, durMs: 600 },
        { word: "there's", note: "G4", timeMs: 1800, durMs: 1000 },
        { word: "no", note: "G4", timeMs: 2800, durMs: 400 },
        { word: "heaven.", note: "A4", timeMs: 3280, durMs: 720 },
        { word: "It's", note: "C4", timeMs: 7680, durMs: 320 },
        { word: "easy", note: "F4", timeMs: 8000, durMs: 320 },
        { word: "if", note: "G4", timeMs: 8400, durMs: 400 },
        { word: "you", note: "B4", timeMs: 9200, durMs: 400 },
        { word: "try.", note: "A4", timeMs: 9840, durMs: 400 },
        { word: "No hell", note: "C4", timeMs: 14560, durMs: 880 },
        { word: "below", note: "A4", timeMs: 16240, durMs: 400 },
        { word: "us,", note: "F4", timeMs: 16880, durMs: 400 },
        { word: "Above", note: "F4", timeMs: 21840, durMs: 440 },
        { word: "us", note: "B4", timeMs: 22280, durMs: 360 },
        { word: "only", note: "B4", timeMs: 22880, durMs: 400 },
        { word: "God.", note: "B4", timeMs: 23440, durMs: 640 }
    ];

    // ─────────────────────────────────────────────────────────────────────────────
    // GLOBAL STATE
    // ─────────────────────────────────────────────────────────────────────────────
    let audioContext, audioBuffer, pills = DEMO_PILLS, isPlaying = false;
    let playbackStart = 0, rafId = null, canvas = null, ctx = null;
    let micStream, micProcessor, micSource, currentMicPitch = -1, currentExpected = null;
    let pitchDebugCounter = 0;
    let currentWordIndex = -1;
    
    // Pitch smoothing buffer (moving average)
    let pitchHistory = [];
    const PITCH_SMOOTH_WINDOW = 6;  // Smooth over last 6 frames

    // ─────────────────────────────────────────────────────────────────────────────
    // SCORECARD SYSTEM
    // ─────────────────────────────────────────────────────────────────────────────
    let scoreCard = {
        totalWords: pills.length,
        wordScores: [],
        accuracy: 0,
        perfectWords: [],
        improvementAreas: []
    };

    function initScoreCard() {
        scoreCard = {
            totalWords: pills.length,
            wordScores: pills.map(p => ({
                word: p.word,
                expected: p.note,
                sung: null,
                status: null,
                attempts: 0
            })),
            accuracy: 0,
            perfectWords: [],
            improvementAreas: []
        };
    }

    function recordPitchAttempt(wordIndex, expectedNote, sungFreq) {
        if (!scoreCard.wordScores[wordIndex]) return;
        
        const word = scoreCard.wordScores[wordIndex];
        
        if (sungFreq <= 0) {
            if (!word.status) word.status = 'missed';
        } else {
            const expectedMidi = noteToMidi(expectedNote);
            const sungMidi = freqToMidi(sungFreq);
            const diff = sungMidi - expectedMidi;
            
            if (Math.abs(diff) <= 1) {
                word.status = 'correct';
            } else if (diff > 1) {
                word.status = 'too-high';
            } else {
                word.status = 'too-low';
            }
        }
        word.attempts++;
    }

    function calculateScore() {
        const results = scoreCard.wordScores;
        const correct = results.filter(w => w.status === 'correct').length;
        const perfect = results.filter(w => w.status === 'correct' && w.attempts === 1);
        const missed = results.filter(w => w.status === 'missed' || !w.status);
        const tooHigh = results.filter(w => w.status === 'too-high');
        const tooLow = results.filter(w => w.status === 'too-low');
        
        scoreCard.accuracy = Math.round((correct / scoreCard.totalWords) * 100);
        scoreCard.perfectWords = perfect.map(w => w.word);
        scoreCard.improvementAreas = [
            ...(tooHigh.length > 0 ? [{ type: 'too-high', count: tooHigh.length, words: tooHigh.map(w => w.word) }] : []),
            ...(tooLow.length > 0 ? [{ type: 'too-low', count: tooLow.length, words: tooLow.map(w => w.word) }] : []),
            ...(missed.length > 0 ? [{ type: 'missed', count: missed.length, words: missed.map(w => w.word) }] : [])
        ];
    }

    function showScorecard() {
        calculateScore();
        
        // Show/hide sections
        const perfectSection = document.getElementById('perfect-section');
        const issuesSection = document.getElementById('issues-section');
        const coachingBox = document.getElementById('coaching-box');
        
        // Perfect words
        if (scoreCard.perfectWords.length > 0) {
            perfectSection.style.display = 'block';
            document.getElementById('perfect-words').innerHTML = scoreCard.perfectWords
                .map(w => `<span class="word-tag correct">${w}</span>`)
                .join('');
        } else {
            perfectSection.style.display = 'none';
        }
        
        // Issues
        if (scoreCard.improvementAreas.length > 0) {
            issuesSection.style.display = 'block';
            let issuesHTML = '';
            scoreCard.improvementAreas.forEach(area => {
                const icon = area.type === 'too-high' ? '📈' : area.type === 'too-low' ? '📉' : '❌';
                const label = area.type === 'too-high' ? 'Singing Too High' : area.type === 'too-low' ? 'Singing Too Low' : 'Missed';
                issuesHTML += `
                    <div style="margin: 12px 0;">
                        <div>${icon} <strong>${label}</strong> (${area.count} words)</div>
                        <div class="word-list">
                            ${area.words.map(w => `<span class="word-tag ${area.type === 'too-high' ? 'high' : area.type === 'too-low' ? 'low' : 'missed'}">${w}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('issues-content').innerHTML = issuesHTML;
        } else {
            issuesSection.style.display = 'none';
        }
        
        // Coaching tips
        if (scoreCard.improvementAreas.length > 0) {
            coachingBox.style.display = 'block';
            const tips = [];
            scoreCard.improvementAreas.forEach(area => {
                if (area.type === 'too-high') {
                    tips.push('Try dropping your pitch on: ' + area.words.join(', '));
                } else if (area.type === 'too-low') {
                    tips.push('Try raising your pitch on: ' + area.words.join(', '));
                } else {
                    tips.push('Focus on singing clearer on: ' + area.words.join(', '));
                }
            });
            document.getElementById('coaching-tips').innerHTML = tips
                .map(tip => `<li>${tip}</li>`)
                .join('');
        } else {
            coachingBox.style.display = 'none';
        }
        
        // Update display
        document.getElementById('scorecard-accuracy').textContent = scoreCard.accuracy + '%';
        const correct = scoreCard.wordScores.filter(w => w.status === 'correct').length;
        document.getElementById('scorecard-summary').textContent = `${correct} / ${scoreCard.totalWords} words correct`;
        
        // Show modal
        document.getElementById('scorecard-modal').classList.add('show');
    }

    function closeScorecard() {
        document.getElementById('scorecard-modal').classList.remove('show');
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────────────────
    window.onload = async function() {
        initScoreCard();
        
        setTimeout(async () => {
            try {
                const response = await fetch(DEMO_SONG_URL);
                const arrayBuffer = await response.arrayBuffer();
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                document.getElementById('app-container').style.display = 'flex';
                initCanvas();
                document.getElementById('play-btn').disabled = false;
                
                setTimeout(() => {
                    window.play();
                }, 500);
                
            } catch (err) {
                console.error('Load error:', err);
            }
        }, 1000);
    };

    // ─────────────────────────────────────────────────────────────────────────────
    // PLAYBACK
    // ─────────────────────────────────────────────────────────────────────────────
    window.play = function() {
        if (!audioBuffer) return;
        
        initScoreCard();
        closeScorecard();
        
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
            audioContext.resume().then(() => startPlayback());
        } else {
            startPlayback();
        }
    };

    function startPlayback() {
        if (window.currentSource) {
            try { window.currentSource.stop(); } catch (e) {}
        }

        pitchHistory = [];  // Reset pitch smoothing buffer
        requestMicPermission();

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        source.start(0);

        window.currentSource = source;
        isPlaying = true;
        playbackStart = audioContext.currentTime;
        document.getElementById('play-btn').disabled = true;

        loop();
    }

    function stop() {
        if (!isPlaying) return;
        
        isPlaying = false;
        
        if (window.currentSource) {
            try { window.currentSource.stop(); } catch (e) {}
        }
        
        if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
        }
        
        document.getElementById('play-btn').disabled = false;
        document.getElementById('big-word').textContent = '🎵';
        document.getElementById('note-display').textContent = '—';
        document.getElementById('progress-fill').style.width = '0%';
        
        // Show scorecard
        showScorecard();
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // MIC & PITCH
    // ─────────────────────────────────────────────────────────────────────────────
    async function requestMicPermission() {
        try {
            if (micStream) return;
            
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            setTimeout(() => {
                if (micStream && !micProcessor) {
                    window.toggleMic();
                }
            }, 300);
            
        } catch (err) {
            console.log('Mic skipped:', err.message);
        }
    }

    window.toggleMic = async function() {
        if (micProcessor) {
            if (micSource) {
                try { micSource.disconnect(); } catch (e) {}
                micSource = null;
            }
            micStream.getTracks().forEach(t => t.stop());
            micStream = null;
            micProcessor = null;
            document.getElementById('mic-btn').textContent = '🎤 Tap for Mic';
            return;
        }

        if (!micStream) {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert('Mic access denied');
                return;
            }
        }

        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            micProcessor = audioContext.createAnalyser();
            micProcessor.fftSize = 4096;
            
            const createSourceFn = audioContext.createMediaStreamSource || audioContext.createMediaStreamAudioSource;
            
            if (!createSourceFn) {
                throw new Error('AudioContext does not support createMediaStreamSource');
            }
            
            micSource = createSourceFn.call(audioContext, micStream);
            micSource.connect(micProcessor);
            
            document.getElementById('mic-btn').textContent = '🎤 Mic ON ✓';

            detectPitch();

        } catch (err) {
            console.error('Mic error:', err.message);
            micProcessor = null;
        }
    };

    // ─────────────────────────────────────────────────────────────────────────────
    // PITCH DETECTION
    // ─────────────────────────────────────────────────────────────────────────────
    // ─────────────────────────────────────────────────────────────────────────────
    // PITCH SMOOTHING (to reduce flickering)
    // ─────────────────────────────────────────────────────────────────────────────
    
    function smoothPitch(rawPitch) {
        // Only add valid pitches to history
        if (rawPitch > 0) {
            pitchHistory.push(rawPitch);
        }
        
        // Keep history size limited
        if (pitchHistory.length > PITCH_SMOOTH_WINDOW) {
            pitchHistory.shift();
        }
        
        // Return average of history, or -1 if no valid pitches
        if (pitchHistory.length === 0) {
            return -1;
        }
        
        const sum = pitchHistory.reduce((a, b) => a + b, 0);
        return sum / pitchHistory.length;
    }

    function detectPitch() {
        if (!micProcessor || !isPlaying) {
            requestAnimationFrame(detectPitch);
            return;
        }

        const dataArray = new Uint8Array(micProcessor.frequencyBinCount);
        micProcessor.getByteTimeDomainData(dataArray);
        
        const floatArray = new Float32Array(dataArray.length);
        for (let i = 0; i < dataArray.length; i++) {
            floatArray[i] = (dataArray[i] - 128) / 128.0;
        }

        const rawPitch = autoCorrelate(floatArray, audioContext.sampleRate);
        const pitch = smoothPitch(rawPitch);  // Apply smoothing!
        currentMicPitch = pitch;

        if (currentExpected && pitch > 0 && currentWordIndex >= 0) {
            recordPitchAttempt(currentWordIndex, currentExpected, pitch);
            
            const expectedMidi = noteToMidi(currentExpected);
            const sungMidi = freqToMidi(pitch);
            const diff = sungMidi - expectedMidi;

            // Debug: Log every frame to console
            pitchDebugCounter++;
            if (pitchDebugCounter % 10 === 0) {
                const sungNote = midiToNote(sungMidi);
                console.log(`Expected: ${currentExpected} (MIDI: ${expectedMidi}) | You: ${sungNote} (${pitch.toFixed(1)}Hz, MIDI: ${sungMidi}) | Diff: ${diff}`);
            }

            // Update display with heard note
            const sungNote = midiToNote(sungMidi);
            document.getElementById('note-display').textContent = `${currentExpected} → ${sungNote}`;

            if (Math.abs(diff) <= 1) {
                document.getElementById('big-word').className = 'correct';
                document.getElementById('note-display').className = 'correct';
            } else if (diff > 1) {
                document.getElementById('big-word').className = 'too-high';
                document.getElementById('note-display').className = 'too-high';
            } else {
                document.getElementById('big-word').className = 'too-low';
                document.getElementById('note-display').className = 'too-low';
            }
        } else {
            document.getElementById('big-word').className = '';
            document.getElementById('note-display').className = '';
        }

        requestAnimationFrame(detectPitch);
    }

    function midiToNote(midi) {
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const octave = Math.floor((midi - 12) / 12);
        const noteIndex = midi % 12;
        return notes[noteIndex] + octave;
    }

    function noteToMidi(noteName) {
        const noteMap = { 'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11 };
        const note = noteName.slice(0, -1);
        const octave = parseInt(noteName.slice(-1));
        return (octave + 1) * 12 + (noteMap[note] || 0);
    }

    function freqToMidi(freq) {
        // Standard formula: A4 (440Hz) = MIDI 69
        return Math.round(69 + 12 * Math.log2(freq / 440));
    }

    function autoCorrelate(buffer, sampleRate) {
        const SIZE = buffer.length;
        const MAX_SAMPLES = Math.floor(SIZE / 2);
        let best_offset = -1;
        let best_correlation = 0;
        let rms = 0;

        for (let i = 0; i < SIZE; i++) {
            rms += buffer[i] * buffer[i];
        }
        rms = Math.sqrt(rms / SIZE);

        if (rms < 0.01) return -1;

        let lastCorrelation = 1;
        for (let offset = 0; offset < MAX_SAMPLES; offset++) {
            let correlation = 0;
            for (let i = 0; i < MAX_SAMPLES; i++) {
                correlation += Math.abs(buffer[i] - buffer[i + offset]);
            }
            correlation = 1 - (correlation / MAX_SAMPLES);
            if (correlation > 0.9) {
                if (correlation > lastCorrelation) {
                    if (correlation > best_correlation) {
                        best_correlation = correlation;
                        best_offset = offset;
                        const shift = parabolicInterpolation(buffer, best_offset, MAX_SAMPLES);
                        return sampleRate / (best_offset + shift);
                    }
                }
            }
            lastCorrelation = correlation;
        }

        if (best_correlation > 0.01) {
            return sampleRate / best_offset;
        }
        return -1;
    }

    function parabolicInterpolation(buffer, x, size) {
        const a = buffer[x];
        const b = buffer[x + 1];
        const c = buffer[x + 2];
        
        const a1 = -a / 2 + b - c / 2;
        const a2 = a - b * 2 + c;
        const a3 = -a / 2 + c / 2;

        if (a2 === 0) return 0;
        return a3 / (2 * a2);
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // ANIMATION LOOP
    // ─────────────────────────────────────────────────────────────────────────────
    function loop() {
        if (!isPlaying) return;

        const elapsed = (audioContext.currentTime - playbackStart) * 1000;
        const songDuration = audioBuffer.duration * 1000;
        const progress = Math.min(100, (elapsed / songDuration) * 100);
        document.getElementById('progress-fill').style.width = progress + '%';

        let currentWord = null;
        let wordIdx = -1;
        for (let i = 0; i < pills.length; i++) {
            const p = pills[i];
            if (elapsed >= p.timeMs && elapsed <= p.timeMs + p.durMs) {
                currentWord = p;
                wordIdx = i;
                break;
            }
        }

        if (wordIdx >= 0 && wordIdx !== currentWordIndex) {
            currentWordIndex = wordIdx;
        }

        if (currentWord) {
            currentExpected = currentWord.note;
            document.getElementById('big-word').textContent = currentWord.word;
            document.getElementById('note-display').textContent = currentWord.note;
        } else {
            document.getElementById('big-word').textContent = '🎵';
            document.getElementById('note-display').textContent = '—';
        }

        renderCanvas(elapsed);

        if (elapsed > songDuration) {
            stop();
            return;
        }

        rafId = requestAnimationFrame(loop);
    }

    function renderCanvas(elapsed) {
        if (!canvas) return;

        const W = canvas.width;
        const H = canvas.height;
        const hitX = W * 0.15;
        const ppm = (W - hitX) / 5000;

        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            const y = (H / 3) * i;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }

        const colors = ['#f44336', '#FF9800', '#c8e600', '#4CAF50', '#00BCD4'];
        
        pills.forEach((p, idx) => {
            const timeUntil = p.timeMs - elapsed;
            const x = hitX + timeUntil * ppm;
            const pw = Math.max(p.durMs * ppm - 2, 4);
            const ph = H - 4;
            const py = 2;

            if (x > W + pw || x + pw < 0) return;

            const colorIdx = idx % colors.length;
            ctx.fillStyle = colors[colorIdx];
            ctx.fillRect(Math.max(0, x), py, pw, ph);
        });

        ctx.strokeStyle = '#E91E63';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(hitX, 0);
        ctx.lineTo(hitX, H);
        ctx.stroke();
    }

    function initCanvas() {
        canvas = document.getElementById('mini-canvas');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx = canvas.getContext('2d');
    }

    window.addEventListener('resize', () => {
        if (canvas) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
    });
</script>
