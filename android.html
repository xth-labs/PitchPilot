<!DOCTYPE html>
<!--
 ╔══════════════════════════════════════════════════════════════════════════════╗
		                     🎤  PitchPilot 1.0  🎤               
 ╠══════════════════════════════════════════════════════════════════════════════╣
 ║  A browser-only karaoke pitch trainer that combines:                         ║
 ║    • Spotify's Basic Pitch (ML note detection) — runs fully in-browser       ║
 ║    • AssemblyAI word-level transcription (optional, API key required)        ║
 ║    • Web Audio API real-time microphone pitch detection (autocorrelation)    ║
 ║    • RapidAPI youtube-mp36 bridge for direct YouTube → MP3 downloads         ║
 ║                                                                              ║
 ║  ARCHITECTURE OVERVIEW                                                       ║
 ║  ─────────────────────                                                       ║
 ║  1. User loads audio (file drop OR YouTube URL via RapidAPI)                 ║
 ║  2. "Detect Notes" runs Basic Pitch + AssemblyAI in parallel                 ║
 ║  3. Notes → pill objects rendered on a scrolling canvas timeline             ║
 ║  4. On playback, the RAF loop ticks song time, yncs lyrics + expected note   ║
 ║  5. Mic input is autocorrelated each audio frame → smoothed note name        ║
 ║  6. Sung note vs. expected note → colour feedback on the big karaoke word    ║
 ║                                                                              ║
 ║  DEPENDENCIES (all CDN / ESM — no build step)                                ║
 ║    @spotify/basic-pitch  1.0.1   https://esm.sh/                             ║
 ║    AssemblyAI REST API   v2      https://api.assemblyai.com/                 ║
 ║    youtube-mp36 (RapidAPI)       https://rapidapi.com/ytjar/api/youtube-mp36 ║
 ║                                                                              ║ 
 ║  YOU CAN ALWAYS FIND ME ON GITHUB IF YOU HAVE FURTHER QUESTIONS              ║   
 ║  https://github.com/onlyGod-can-Intimidate-me/PitchPilot                     ║
 ║  coded by John Tsorotes                                                      ║ 
 ╚══════════════════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎤 PitchPilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── WELCOME MODAL ────────────────────────────────────────────────────── */
        #welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        #welcome-modal.hidden {
            display: none;
        }

        .welcome-content {
            background: #111;
            border: 2px solid #E91E63;
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            max-width: 90vw;
            width: 100%;
        }

        .welcome-title {
            font-size: clamp(24px, 8vw, 48px);
            font-weight: bold;
            color: #E91E63;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .welcome-text {
            font-size: clamp(14px, 4vw, 18px);
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .welcome-input {
            width: 100%;
            padding: 14px;
            font-size: clamp(13px, 3vw, 16px);
            border: 2px solid #333;
            border-radius: 8px;
            background: #0f0f0f;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin-bottom: 16px;
            text-align: center;
        }

        .welcome-btn {
            width: 100%;
            padding: clamp(12px, 3vw, 16px);
            font-size: clamp(14px, 3vw, 18px);
            background: #E91E63;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .welcome-btn:active {
            transform: scale(0.96);
        }

        .welcome-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* ── MAIN CONTAINER ────────────────────────────────────────────────────── */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow: hidden;
        }

        /* PORTRAIT MODE */
        @media (orientation: portrait) {
            #mini-canvas-wrap {
                flex: 0 0 12%;
            }

            #lyrics-section {
                flex: 1;
            }

            #controls-section {
                flex: 0 0 20%;
            }
        }

        /* LANDSCAPE MODE — OPTIMIZE FOR SINGING */
        @media (orientation: landscape) {
            #app-container {
                flex-direction: column;
            }

            #mini-canvas-wrap {
                flex: 0 0 15%;
            }

            #lyrics-section {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #controls-section {
                flex: 0 0 20%;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 6px;
            }

            #controls-section button {
                padding: 8px 4px !important;
                font-size: 11px !important;
                min-height: 50px;
            }
        }

        /* ── PITCH CANVAS ────────────────────────────────────────────────────── */
        #mini-canvas-wrap {
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            background: #080808;
            position: relative;
        }

        #mini-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── LYRICS SECTION ──────────────────────────────────────────────────── */
        #lyrics-section {
            background: #000;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
        }

        #key-legend {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            font-weight: bold;
            line-height: 1.6;
            text-align: right;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 6px;
        }

        .k-high {
            color: #c8e600;
        }

        .k-low {
            color: #f44336;
        }

        .k-correct {
            color: #4CAF50;
        }

        #big-word {
            font-size: clamp(48px, 20vw, 120px);
            font-weight: bold;
            letter-spacing: 2px;
            color: #c8e600;
            line-height: 1;
            margin-bottom: 16px;
            transition: color 0.08s ease;
            word-wrap: break-word;
        }

        #big-word.correct {
            color: #4CAF50;
        }

        #big-word.too-high {
            color: #c8e600;
        }

        #big-word.too-low {
            color: #f44336;
        }

        #note-display {
            font-size: clamp(16px, 8vw, 32px);
            font-weight: bold;
            letter-spacing: 4px;
            color: #666;
            transition: color 0.08s ease;
        }

        #note-display.correct {
            color: #4CAF50;
        }

        #note-display.too-high {
            color: #c8e600;
        }

        #note-display.too-low {
            color: #f44336;
        }

        /* ── CONTROLS SECTION ────────────────────────────────────────────────── */
        #controls-section {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #button-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            width: 100%;
        }

        #button-row button {
            padding: 10px 4px !important;
            font-size: 12px !important;
            min-height: auto;
        }
    </style>
</head>
<body>

<!-- WELCOME MODAL -->
<div id="welcome-modal">
    <div class="welcome-content">
        <div class="welcome-title">🎤 PitchPilot</div>
        <div id="welcome-step-1">
            <div class="welcome-text">
                The app that lets you check your pitch when singing against any song you like from YouTube.
                <br><br>
                Please enter the YouTube link of the song you wish to cover, then click START.
            </div>
            <input
                type="text"
                id="welcome-url"
                class="welcome-input"
                placeholder="Paste YouTube URL..."
                onkeydown="if(event.key==='Enter') startPitchPilot()"
            >
            <button class="welcome-btn" onclick="startPitchPilot()">▶ START</button>
            <div id="welcome-error" style="color: #f44336; font-size: 12px; margin-top: 12px;"></div>
        </div>

        <div id="welcome-step-2" style="display:none;">
            <div id="loading-text" class="welcome-text">⏳ Downloading audio...</div>
            <div style="width:100%; background:#111; border-radius:4px; padding:2px; margin:16px 0;">
                <div id="loading-progress" style="height:8px; background:#E91E63; width:0%; border-radius:4px; transition:width 0.3s;"></div>
            </div>
            <div style="font-size:11px; color:#555; text-align:center;" id="loading-detail">0%</div>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app-container" style="display:none;">

    <!-- PITCH CANVAS AT TOP -->
    <div id="mini-canvas-wrap">
        <canvas id="mini-canvas"></canvas>
    </div>

    <!-- BIG LYRICS CENTER -->
    <div id="lyrics-section">
        <div id="key-legend">
            <div class="k-correct">🟢 CORRECT</div>
            <div class="k-high">🟡 TOO HIGH</div>
            <div class="k-low">🔴 TOO LOW</div>
        </div>
        <div id="big-word">Ready</div>
        <div id="note-display">—</div>
    </div>

    <!-- BUTTONS AT BOTTOM -->
    <div id="controls-section">
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="status-msg">Ready</div>
        <div id="button-row">
            <button id="mic-btn" onclick="window.requestMicrophoneAccess()" style="background:#00BCD4;">🎤 MIC</button>
            <button id="play-btn" onclick="window.play()" style="background:#4CAF50;">▶ PLAY</button>
            <button id="stop-btn" onclick="window.stop()" style="background:#444;">⏹ STOP</button>
            <button id="loop-btn" onclick="window.toggleLoop()" style="background:#FF9800;">🔁 LOOP</button>
        </div>
    </div>

</div>

<script>
    const WORKER_URL = 'https://lingering-mouse-8c7c.tsorotes-john.workers.dev/youtube';
    const HF_TOKEN = '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';
    const AAI_TOKEN = '9b1ed985cab647eabfbba182fc0cdfb3';
    const RAPIDAPI_KEY = '38fe2f4d6dmshb20807c839504ffp112b93jsn4a00c20abfb3';

    // Global state
    let audioContext = null;
    let audioBuffer = null;
    let audioSource = null;
    let isPlaying = false;
    let isLooping = false;
    let playbackStart = 0;
    let pills = [];
    let currentExpected = null;
    let canvas = null;
    let ctx = null;
    let rafId = null;

    async function startPitchPilot() {
        const url = document.getElementById('welcome-url').value.trim();
        const errorEl = document.getElementById('welcome-error');
        errorEl.textContent = '';

        if (!url) {
            errorEl.textContent = '❌ Please paste a YouTube URL';
            return;
        }

        const match = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
        if (!match) {
            errorEl.textContent = '❌ Could not find YouTube video ID';
            return;
        }

        const videoId = match[1];

        // Show loading
        document.getElementById('welcome-step-1').style.display = 'none';
        document.getElementById('welcome-step-2').style.display = 'block';

        // Request fullscreen
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }

        await downloadAndAnalyse(videoId);
    }

    async function downloadAndAnalyse(videoId) {
        updateLoading('⏳ Downloading audio...', 10);

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoId, apiKey: RAPIDAPI_KEY })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: 'Download failed' }));
                throw new Error(err.error || 'Download error');
            }

            const audioBlob = await res.blob();
            updateLoading('⏳ Loading audio...', 30);

            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioBuffer = await audioContext.decodeAudioData(await audioBlob.arrayBuffer());

            updateLoading('⏳ Extracting lyrics...', 50);

            // Transcribe with HuggingFace Whisper
            const transcription = await transcribeAudio(audioBlob);
            const words = transcription.split(/\s+/).filter(w => w.length > 0);
            
            // Create pills from words
            pills = generatePillsFromWords(words, audioBuffer.duration);

            updateLoading('✅ Ready to sing!', 100);

            setTimeout(() => {
                document.getElementById('welcome-modal').classList.add('hidden');
                document.getElementById('app-container').style.display = 'flex';
                initAudio();
                initCanvas();
                document.getElementById('big-word').textContent = '♪';
                document.getElementById('status-msg').textContent = 'Ready to play';
            }, 1500);

        } catch (err) {
            updateLoading('❌ ' + err.message, 0);
            setTimeout(() => {
                document.getElementById('welcome-step-2').style.display = 'none';
                document.getElementById('welcome-step-1').style.display = 'block';
                document.getElementById('welcome-error').textContent = '❌ ' + err.message;
            }, 2000);
        }
    }

    async function transcribeAudio(audioBlob) {
        try {
            console.log('Uploading to AssemblyAI...');
            
            // Step 1 - Upload audio
            const uploadRes = await fetch('https://api.assemblyai.com/v2/upload', {
                method: 'POST',
                headers: {
                    'authorization': AAI_TOKEN,
                    'content-type': 'application/octet-stream'
                },
                body: audioBlob
            });

            if (!uploadRes.ok) {
                throw new Error('Upload failed: ' + uploadRes.status);
            }

            const { upload_url } = await uploadRes.json();
            console.log('Uploaded, requesting transcription...');

            // Step 2 - Request transcription
            const transcriptRes = await fetch('https://api.assemblyai.com/v2/transcript', {
                method: 'POST',
                headers: {
                    'authorization': AAI_TOKEN,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    audio_url: upload_url,
                    speech_models: ['universal-2']
                })
            });

            const { id } = await transcriptRes.json();
            console.log('Transcription job ID:', id);

            // Step 3 - Poll for completion
            for (let i = 0; i < 60; i++) {
                await new Promise(r => setTimeout(r, 2000));

                const pollRes = await fetch(`https://api.assemblyai.com/v2/transcript/${id}`, {
                    headers: { 'authorization': AAI_TOKEN }
                });

                const data = await pollRes.json();
                console.log('Status:', data.status);

                if (data.status === 'completed') {
                    const words = data.words || [];
                    const text = words.map(w => w.text).join(' ');
                    console.log('Transcribed:', text.substring(0, 100));
                    return text;
                }

                if (data.status === 'error') {
                    throw new Error('Transcription error: ' + data.error);
                }
            }

            throw new Error('Transcription timeout');

        } catch (err) {
            console.error('AssemblyAI error:', err);
            return 'sing along with the melody';
        }
    }

    function generatePillsFromWords(words, duration) {
        const pills = [];
        const noteSequence = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        const timePerWord = (duration * 1000) / Math.max(words.length, 1);

        console.log('Generating pills from', words.length, 'words');
        console.log('Duration:', duration, 'seconds, time per word:', timePerWord, 'ms');
        console.log('Words:', words.slice(0, 10).join(', '));

        words.forEach((word, i) => {
            pills.push({
                timeMs: i * timePerWord,
                durMs: timePerWord * 0.8,
                word: word.toUpperCase(),
                note: noteSequence[i % noteSequence.length],
                state: 'upcoming'
            });
        });

        console.log('Total pills created:', pills.length);
        return pills;
    }

    function updateLoading(text, pct) {
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading-progress').style.width = pct + '%';
        document.getElementById('loading-detail').textContent = pct + '%';
    }

    function initAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    function initCanvas() {
        canvas = document.getElementById('mini-canvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth || 600;
        canvas.height = canvas.offsetHeight || 80;
    }

    window.play = function() {
        if (!audioBuffer) return;
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();

        if (audioContext.state === 'suspended') audioContext.resume();

        if (!audioSource) {
            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioContext.destination);
        }

        isPlaying = true;
        playbackStart = audioContext.currentTime;
        audioSource.start();
        document.getElementById('play-btn').disabled = true;
        document.getElementById('status-msg').textContent = 'Playing...';

        loop();
    };

    window.stop = function() {
        if (audioSource) {
            try { audioSource.stop(); } catch (e) {}
            audioSource = null;
        }
        isPlaying = false;
        document.getElementById('play-btn').disabled = false;
        document.getElementById('status-msg').textContent = 'Stopped';
        cancelAnimationFrame(rafId);
    };

    window.toggleLoop = function() {
        isLooping = !isLooping;
        document.getElementById('loop-btn').style.opacity = isLooping ? '1' : '0.6';
        document.getElementById('status-msg').textContent = isLooping ? 'Loop ON' : 'Loop OFF';
    };

    window.requestMicrophoneAccess = async function() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('mic-btn').style.background = '#4CAF50';
            document.getElementById('mic-btn').textContent = '🎤 ON';
            document.getElementById('status-msg').textContent = 'Mic active';
        } catch (err) {
            alert('Microphone access denied');
        }
    };

    function loop() {
        if (!isPlaying) return;

        const elapsed = (audioContext.currentTime - playbackStart) * 1000;
        const songDuration = audioBuffer.duration * 1000;
        const progress = Math.min(100, (elapsed / songDuration) * 100);
        document.getElementById('progress-fill').style.width = progress + '%';

        const nearestPill = pills.reduce((best, p) => {
            const dist = Math.abs(p.timeMs - elapsed);
            return dist < Math.abs((best?.timeMs ?? Infinity) - elapsed) ? p : best;
        }, null);

        if (nearestPill && Math.abs(nearestPill.timeMs - elapsed) < 2000) {
            currentExpected = nearestPill.note;
            document.getElementById('big-word').textContent = nearestPill.word;
            document.getElementById('note-display').textContent = nearestPill.note;
        } else {
            document.getElementById('big-word').textContent = '♪';
            document.getElementById('note-display').textContent = '—';
        }

        renderCanvas(elapsed);

        if (elapsed > songDuration) {
            if (isLooping) {
                window.stop();
                setTimeout(window.play, 300);
            } else {
                window.stop();
            }
            return;
        }

        rafId = requestAnimationFrame(loop);
    }

    function renderCanvas(elapsed) {
        if (!canvas) return;

        const W = canvas.width;
        const H = canvas.height;
        const hitX = W * 0.15;
        const ppm = (W - hitX) / 5000;

        // Clear
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, W, H);

        // Draw background lanes
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            const y = (H / 3) * i;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }

        // Draw pills with colors based on note
        const colors = ['#f44336', '#FF9800', '#c8e600', '#4CAF50', '#00BCD4'];
        
        pills.forEach((p, idx) => {
            const timeUntil = p.timeMs - elapsed;
            const x = hitX + timeUntil * ppm;
            const pw = Math.max(p.durMs * ppm - 2, 4);
            const ph = H - 4;
            const py = 2;

            if (x > W + pw || x + pw < 0) return;

            // Color based on note sequence
            const colorIdx = idx % colors.length;
            ctx.fillStyle = colors[colorIdx];
            ctx.fillRect(Math.max(0, x), py, pw, ph);
        });

        // Hit line (vertical)
        ctx.strokeStyle = '#E91E63';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(hitX, 0);
        ctx.lineTo(hitX, H);
        ctx.stroke();
    }
</script>

</body>
</html>
