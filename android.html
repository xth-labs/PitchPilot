<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PitchPilot (Fixed Mic)</title>
</head>
<body>
<button onclick="startMic()">Start Mic</button>
<script>
let audioContext;
let micStream;
let analyser;
let dataArray;

async function startMic() {
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Always request fresh stream (avoid dead stream reuse)
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const source = audioContext.createMediaStreamSource(micStream);

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;

        source.connect(analyser);

        dataArray = new Float32Array(analyser.fftSize);

        detectPitch();

        console.log("Mic working ✅");
    } catch (err) {
        console.error("Mic error:", err);
        alert("Mic failed: " + err.message);
    }
}

function detectPitch() {
    analyser.getFloatTimeDomainData(dataArray);

    const pitch = autoCorrelate(dataArray, audioContext.sampleRate);

    if (pitch !== -1) {
        console.log("Pitch:", pitch.toFixed(2));
    }

    requestAnimationFrame(detectPitch);
}

function autoCorrelate(buffer, sampleRate) {
    let SIZE = buffer.length;
    let rms = 0;

    for (let i = 0; i < SIZE; i++) {
        let val = buffer[i];
        rms += val * val;
    }

    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.01) return -1;

    let r1 = 0, r2 = SIZE - 1;
    for (let i = 0; i < SIZE / 2; i++) {
        if (Math.abs(buffer[i]) < 0.2) { r1 = i; break; }
    }
    for (let i = 1; i < SIZE / 2; i++) {
        if (Math.abs(buffer[SIZE - i]) < 0.2) { r2 = SIZE - i; break; }
    }

    buffer = buffer.slice(r1, r2);
    SIZE = buffer.length;

    let c = new Array(SIZE).fill(0);
    for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE - i; j++) {
            c[i] = c[i] + buffer[j] * buffer[j + i];
        }
    }

    let d = 0;
    while (c[d] > c[d + 1]) d++;

    let maxval = -1;
    let maxpos = -1;
    for (let i = d; i < SIZE; i++) {
        if (c[i] > maxval) {
            maxval = c[i];
            maxpos = i;
        }
    }

    let T0 = maxpos;

    let x1 = c[T0 - 1];
    let x2 = c[T0];
    let x3 = c[T0 + 1];

    let a = (x1 + x3 - 2 * x2) / 2;
    let b = (x3 - x1) / 2;

    if (a) T0 = T0 - b / (2 * a);

    return sampleRate / T0;
}
</script>
</body>
</html>
